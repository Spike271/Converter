name: CMake on multiple platforms

on:
  push:
    branches: [ "dev" ]
    tags: [ "v1.2" ]
  pull_request:
    branches: [ "dev" ]
    
permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        build_type: [ Release ]
        cpp_complier: [ g++, clang++, cl ]
        
        include:
          # Windows configurations
          - os: windows-latest
            cpp_compiler: cl
          - os: windows-latest
            cpp_compiler: g++
          - os: windows-latest
            cpp_compiler: clang++
            
          # Linux configurations
          - os: ubuntu-latest
            cpp_compiler: g++
          - os: ubuntu-latest
            cpp_compiler: clang++
            
          # macOS configurations
          - os: macos-latest
            cpp_compiler: clang++
          - os: macos-latest
            cpp_compiler: g++

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install ninja

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build libx11-dev

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -G Ninja
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}
      
    - name: Determine Executable Name
      id: exe-name
      shell: bash
      run: |
        EXE_PATH="${{ steps.strings.outputs.build-output-dir }}/my_application"
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          EXE_PATH="${EXE_PATH}.exe"
        fi
        echo "exe_path=$EXE_PATH" >> $GITHUB_OUTPUT

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: executable-${{ matrix.os }}-${{ matrix.c_compiler }}
        path: ${{ steps.exe-name.outputs.exe_path }}
